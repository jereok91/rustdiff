<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Fondo circular o con esquinas muy redondeadas -->
    <clipPath id="appClip">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
    <!-- Gradiente de fondo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2A3A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>

  <!-- Fondo con gradiente -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bgGrad)"/>

  <!-- Círculo delimitador central (guía visual) -->
  <circle cx="64" cy="60" r="42" fill="none" stroke="#3A4A5A" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>

  <!-- Panel izquierdo (JSON - verde) -->
  <rect x="18" y="28" width="38" height="64" rx="5" ry="5"
        fill="#1A3A2A" stroke="#2ECC71" stroke-width="1.2"/>
  <!-- Líneas simulando código JSON -->
  <rect x="23" y="35" width="16" height="2.5" rx="1" fill="#2ECC71" opacity="0.9"/>
  <rect x="23" y="41" width="24" height="2.5" rx="1" fill="#27AE60" opacity="0.7"/>
  <rect x="23" y="47" width="20" height="2.5" rx="1" fill="#27AE60" opacity="0.7"/>
  <rect x="23" y="53" width="26" height="2.5" rx="1" fill="#2ECC71" opacity="0.9"/>
  <rect x="23" y="59" width="18" height="2.5" rx="1" fill="#27AE60" opacity="0.5"/>
  <rect x="23" y="65" width="22" height="2.5" rx="1" fill="#27AE60" opacity="0.7"/>
  <rect x="23" y="71" width="14" height="2.5" rx="1" fill="#2ECC71" opacity="0.9"/>
  <rect x="23" y="77" width="24" height="2.5" rx="1" fill="#27AE60" opacity="0.5"/>

  <!-- Panel derecho (XML - naranja) -->
  <rect x="72" y="28" width="38" height="64" rx="5" ry="5"
        fill="#3A2A1A" stroke="#E67E22" stroke-width="1.2"/>
  <!-- Líneas simulando código XML -->
  <rect x="77" y="35" width="24" height="2.5" rx="1" fill="#E67E22" opacity="0.9"/>
  <rect x="77" y="41" width="16" height="2.5" rx="1" fill="#D35400" opacity="0.7"/>
  <rect x="77" y="47" width="26" height="2.5" rx="1" fill="#D35400" opacity="0.7"/>
  <!-- Línea DIFERENTE (rojo = eliminada) -->
  <rect x="77" y="53" width="26" height="4" rx="1.5" fill="#C0392B" opacity="0.7"/>
  <rect x="77" y="53" width="26" height="4" rx="1.5" fill="none" stroke="#E74C3C" stroke-width="0.6"/>
  <rect x="77" y="59" width="20" height="2.5" rx="1" fill="#D35400" opacity="0.5"/>
  <!-- Línea DIFERENTE (verde = añadida) -->
  <rect x="77" y="65" width="22" height="4" rx="1.5" fill="#1A6B2A" opacity="0.8"/>
  <rect x="77" y="65" width="22" height="4" rx="1.5" fill="none" stroke="#2ECC71" stroke-width="0.6"/>
  <rect x="77" y="71" width="16" height="2.5" rx="1" fill="#D35400" opacity="0.5"/>
  <rect x="77" y="77" width="24" height="2.5" rx="1" fill="#E67E22" opacity="0.7"/>

  <!-- Flechas bidireccionales centrales -->
  <!-- Flecha izquierda → derecha -->
  <line x1="58" y1="56" x2="70" y2="56" stroke="#5DADE2" stroke-width="2" stroke-linecap="round"/>
  <polygon points="70,53.5 74,56 70,58.5" fill="#5DADE2"/>
  <!-- Flecha derecha → izquierda -->
  <line x1="70" y1="64" x2="58" y2="64" stroke="#5DADE2" stroke-width="2" stroke-linecap="round"/>
  <polygon points="58,61.5 54,64 58,66.5" fill="#5DADE2"/>

  <!-- Punto central (símbolo diff) -->
  <circle cx="64" cy="60" r="4" fill="#2980B9"/>
  <circle cx="64" cy="60" r="2.5" fill="#5DADE2"/>

  <!-- Etiqueta "diff" debajo -->
  <text x="64" y="112" font-family="monospace" font-size="10" font-weight="bold"
        text-anchor="middle" fill="#5DADE2" opacity="0.8">≠ diff</text>
</svg>
