app-id: com.digitalgex.RustDiff
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rustdiff

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rustdiff/cargo

modules:
  - name: rustdiff
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --manifest-path Cargo.toml --verbose
      - install -Dm755 ./target/release/rustdiff /app/bin/rustdiff
      - install -Dm644 ./data/com.digitalgex.RustDiff.desktop -t /app/share/applications
      - install -Dm644 ./data/com.digitalgex.RustDiff.metainfo.xml -t /app/share/metainfo
      - install -Dm644 ./data/icons/com.digitalgex.RustDiff.svg -t /app/share/icons/hicolor/scalable/apps
      - mkdir -p /app/share/rustdiff/language-specs
      - install -Dm644 ./data/language-specs/*.lang -t /app/share/rustdiff/language-specs
      - mkdir -p /app/share/rustdiff/icons/symbolic/hicolor/scalable/actions
      - install -Dm644 ./data/icons/symbolic/hicolor/scalable/actions/*.svg -t /app/share/rustdiff/icons/symbolic/hicolor/scalable/actions
    sources:
      - type: dir
        path: .
        skip:
          - build-dir
          - .flatpak-builder
          - target
          - .git
          - .github
          - .cargo
          - vendor
      - cargo-sources.json
