app-id: com.digitalgex.RustDiff
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rustdiff

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rustdiff/cargo

modules:
  - name: rustdiff
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --manifest-path Cargo.toml --verbose
      - install -Dm755 ./target/release/rustdiff /app/bin/rustdiff
      - install -Dm644 ./data/com.digitalgex.RustDiff.desktop -t /app/share/applications
      - install -Dm644 ./data/com.digitalgex.RustDiff.metainfo.xml -t /app/share/metainfo
      - install -Dm644 ./data/icons/com.digitalgex.RustDiff.svg -t /app/share/icons/hicolor/scalable/apps
    sources:
      - type: git
        url: https://github.com/jereok91/rustdiff.git
        tag: v0.2.2
        commit: f15f3f7af406dae657b1ce786c55144db3e43c29
        # flatpak-external-data-checker: si el workflow `release-flathub`
        # del repo upstream falla, este metadato deja que el bot oficial
        # de Flathub detecte nuevos tags y abra un PR por su cuenta.
        x-checker-data:
          type: git
          tag-pattern: ^v(\d+\.\d+\.\d+)$
      - cargo-sources.json
